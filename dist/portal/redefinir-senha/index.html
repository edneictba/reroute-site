<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Redefinir senha | REROUTE Portal</title>
  <link rel="icon" href="/assets/icons/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/src/portal/styles/portal.css" />
  <script src="/src/portal/core/runtime-config.js"></script>
  <script type="module" src="/src/portal/core/portal.js"></script>
</head>
<body data-portal-page="reset-password">
  <div class="portal-shell portal-public">
    <header class="portal-public-header">
      <a class="portal-mark compact" href="/portal/" aria-label="REROUTE Portal">
        <img src="/assets/images/logo-reroute-hns-640.png" alt="REROUTE - The First Human Navigation System" width="142" height="95" />
      </a>
      <a class="portal-button ghost" href="/portal/login/">Voltar ao login</a>
    </header>

    <main class="portal-public-main">
      <div class="portal-container portal-hero-grid">
        <section>
          <span class="portal-kicker">Nova senha</span>
          <h1 class="portal-title">Atualize sua senha</h1>
          <p class="portal-subtitle">Use uma senha com pelo menos 8 caracteres. Se o link estiver expirado, solicite uma nova recuperação.</p>
          <p class="portal-note">Não registramos sua senha em logs ou mensagens.</p>
        </section>

        <section class="portal-card portal-login-card glow" aria-labelledby="resetTitle">
          <h2 id="resetTitle">Redefinir senha</h2>
          <form class="portal-form" data-reset-form data-message-target="portalResetMessage" novalidate>
            <div class="portal-field">
              <label class="portal-label" for="portalNewPassword">Nova senha</label>
              <div class="portal-input-wrap">
                <input class="portal-input" id="portalNewPassword" name="password" type="password" autocomplete="new-password" placeholder="Mínimo de 8 caracteres" aria-describedby="portalResetMessage portalNewPasswordError" required />
                <button class="portal-password-toggle" type="button" data-password-toggle data-password-target="portalNewPassword" aria-pressed="false">Mostrar</button>
              </div>
              <p class="portal-field-error" id="portalNewPasswordError" hidden></p>
            </div>
            <div class="portal-field">
              <label class="portal-label" for="portalConfirmPassword">Confirmar nova senha</label>
              <div class="portal-input-wrap">
                <input class="portal-input" id="portalConfirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="Repita a nova senha" aria-describedby="portalResetMessage portalConfirmPasswordError" required />
                <button class="portal-password-toggle" type="button" data-password-toggle data-password-target="portalConfirmPassword" aria-pressed="false">Mostrar</button>
              </div>
              <p class="portal-field-error" id="portalConfirmPasswordError" hidden></p>
            </div>
            <button class="portal-button primary" type="submit">Atualizar senha</button>
            <p class="portal-message" id="portalResetMessage" aria-live="polite"></p>
          </form>
          <p class="portal-page-copy"><a href="/portal/recuperar-senha/">Solicitar novo link</a></p>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
