<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Acesso negado | REROUTE Portal</title>
  <link rel="icon" href="/assets/icons/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/src/portal/styles/portal.css" />
  <script src="/src/portal/core/runtime-config.js"></script>
  <script type="module" src="/src/portal/core/portal.js"></script>
</head>
<body data-auth-required="true" data-portal-page="access-denied">
  <main class="portal-shell portal-state" data-auth-loading>
    <section class="portal-card portal-state-card">
      <span class="portal-loading">Verificando sessão...</span>
      <p class="portal-page-copy">Validando seu acesso ao REROUTE Portal.</p>
    </section>
  </main>

  <main class="portal-shell portal-state" data-auth-error hidden>
    <section class="portal-card portal-state-card">
      <div class="portal-state-icon">!</div>
      <h1 class="portal-page-title">Não foi possível validar o acesso.</h1>
      <p class="portal-page-copy" data-auth-error-message></p>
      <div class="portal-actions">
        <a class="portal-button primary" href="/portal/login/">Voltar ao login</a>
      </div>
    </section>
  </main>

  <main class="portal-shell portal-state" data-private-content hidden>
    <section class="portal-card portal-state-card glow" aria-labelledby="stateTitle">
      <div class="portal-state-icon" aria-hidden="true">!</div>
      <span class="portal-kicker">Acesso negado</span>
      <h1 class="portal-page-title" id="stateTitle" data-access-denied-title>Você não possui autorização para acessar esta área.</h1>
      <p class="portal-page-copy" data-access-denied-message>Seu acesso ainda não está autorizado para esta área.</p>
      <div class="portal-actions">
        <a class="portal-button primary" href="/portal/dashboard/">Voltar ao dashboard</a>
        <a class="portal-button secondary" href="/portal/">Início do Portal</a>
      </div>
    </section>
  </main>
</body>
</html>
