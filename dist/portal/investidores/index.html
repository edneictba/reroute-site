<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Investidores e Cap Table | REROUTE Portal</title>
  <link rel="icon" href="/assets/icons/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/src/portal/styles/portal.css" />
  <script src="/src/portal/core/runtime-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
  <script type="module" src="/src/portal/core/portal.js"></script>
</head>
<body data-auth-required="true" data-context-required="true" data-required-capabilities="portal.access,workspace.access,investor.manage" data-portal-page="investors">
  <main class="portal-shell portal-state" data-auth-loading>
    <section class="portal-card portal-state-card">
      <span class="portal-loading">Verificando sessão...</span>
      <p class="portal-page-copy">Validando seu acesso ao REROUTE Portal.</p>
    </section>
  </main>

  <main class="portal-shell portal-state" data-auth-error hidden>
    <section class="portal-card portal-state-card">
      <div class="portal-state-icon">!</div>
      <h1 class="portal-page-title">Não foi possível validar o acesso.</h1>
      <p class="portal-page-copy" data-auth-error-message></p>
      <div class="portal-actions">
        <a class="portal-button primary" href="/portal/login/">Voltar ao login</a>
      </div>
    </section>
  </main>

  <div class="portal-shell portal-app" data-private-content hidden>
    <aside class="portal-sidebar" data-portal-sidebar>
      <div class="portal-sidebar-inner">
        <a class="portal-mark compact" href="/portal/" aria-label="REROUTE Portal">
          <img src="/assets/images/logo-reroute-hns-640.png" alt="REROUTE - The First Human Navigation System" width="142" height="95" />
        </a>
        <nav class="portal-nav" aria-label="Navegação do Portal" data-portal-nav></nav>
        <footer class="portal-footer" data-dashboard-footer>Ambiente autenticado com dados demonstrativos. RLS permanece como barreira principal.</footer>
      </div>
    </aside>

    <main class="portal-main">
      <header class="portal-topbar">
        <button class="portal-mobile-toggle" type="button" aria-label="Abrir menu do portal" aria-expanded="false" data-sidebar-toggle>
          <span></span><span></span><span></span>
        </button>
        <span class="portal-badge demo" data-dashboard-environment>Ambiente autenticado - dados demonstrativos</span>
        <div class="portal-workspace-switcher" data-workspace-switcher hidden></div>
        <div class="portal-user-menu" aria-label="Usuário autenticado">
          <span data-user-name>Usuário autenticado</span>
          <span class="portal-avatar" data-user-initial>R</span>
          <button class="portal-button secondary compact" type="button" data-logout>Sair</button>
        </div>
      </header>

      <div class="portal-content">
        <section class="portal-page-header" data-investors-page-header></section>
        <section class="portal-grid metrics portal-investors-summary" data-investors-summary aria-label="Resumo do cap table"></section>
        <section class="portal-finance-alerts" data-investors-alerts aria-label="Alertas do cap table"></section>
        <section class="portal-grid two portal-dashboard-columns" data-investors-charts></section>
        <section class="portal-investors-toolbar portal-card padded" data-investors-toolbar aria-label="Filtros do cap table"></section>
        <section class="portal-card padded portal-investors-table-card" data-investors-table aria-live="polite"></section>
        <aside class="portal-investor-detail" data-investor-detail hidden></aside>
      </div>
    </main>
  </div>
</body>
</html>
