<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Login | REROUTE Portal</title>
  <link rel="icon" href="/assets/icons/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/src/portal/styles/portal.css" />
  <script src="/src/portal/core/runtime-config.js"></script>
  <script type="module" src="/src/portal/core/portal.js"></script>
</head>
<body data-portal-page="login">
  <div class="portal-shell portal-public">
    <header class="portal-public-header">
      <a class="portal-mark compact" href="/portal/" aria-label="REROUTE Portal">
        <img src="/assets/images/logo-reroute-hns-640.png" alt="REROUTE - The First Human Navigation System" width="142" height="95" />
      </a>
      <a class="portal-button ghost" href="/">Voltar ao site</a>
    </header>

    <main class="portal-public-main">
      <div class="portal-container portal-hero-grid">
        <section>
          <span class="portal-kicker">Login restrito</span>
          <h1 class="portal-title">Acesse o REROUTE Portal</h1>
          <p class="portal-subtitle">Ambiente exclusivo para investidores, administradores e colaboradores autorizados.</p>
          <p class="portal-note">Entre com as credenciais autorizadas do Portal.</p>
        </section>

        <section class="portal-card portal-login-card glow" aria-labelledby="loginTitle">
          <h2 id="loginTitle">Entrar</h2>
          <form class="portal-form" data-login-form data-message-target="portalLoginMessage" novalidate>
            <div class="portal-field">
              <label class="portal-label" for="portalEmail">E-mail</label>
              <input class="portal-input" id="portalEmail" name="email" type="email" autocomplete="email" placeholder="seu@email.com" aria-describedby="portalLoginMessage" required />
              <p class="portal-field-error" id="portalEmailError" hidden></p>
            </div>
            <div class="portal-field">
              <label class="portal-label" for="portalPassword">Senha</label>
              <div class="portal-input-wrap">
                <input class="portal-input" id="portalPassword" name="password" type="password" autocomplete="current-password" placeholder="Sua senha" aria-describedby="portalLoginMessage" required data-password-input />
                <button class="portal-password-toggle" type="button" data-password-toggle data-password-target="portalPassword" aria-pressed="false">Mostrar</button>
              </div>
              <p class="portal-field-error" id="portalPasswordError" hidden></p>
            </div>
            <div class="portal-check-row">
              <label><input type="checkbox" name="remember" /> Lembrar de mim</label>
              <a href="/portal/recuperar-senha/">Esqueci minha senha</a>
            </div>
            <button class="portal-button primary" type="submit">Entrar</button>
            <p class="portal-message" id="portalLoginMessage" data-login-message aria-live="polite"></p>
          </form>
          <p class="portal-page-copy">Acesso restrito. Em caso de dúvida, fale com o suporte em <a href="mailto:contato@reroute.com.br">contato@reroute.com.br</a>.</p>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
